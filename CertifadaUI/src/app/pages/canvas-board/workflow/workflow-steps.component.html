<div class="bg-white w-full max-w-4xl mx-auto">
  <div class="mb-4">
   <label for="workflowTemplate" class="block text-sm font-medium text-gray-700 mb-1">Select Template</label>
    <select
      id="workflowTemplate"
      [(ngModel)]="selectedTemplate"
      (change)="onTemplateSelect()"
      class="p-2 w-full border border-gray-300 rounded-md mb-4 h-10"
    >
      <option value="">-- Create New Workflow --</option>
      <option *ngFor="let tmpl of savedTemplates" [value]="tmpl.name">
        {{ tmpl.name }}
      </option>
    </select>

    <label for="workflowName" class="block text-sm font-medium text-gray-700">Workflow Name</label>
    <input 
      type="text" 
      id="workflowName" 
      [(ngModel)]="workflowName" 
      class="mt-2 p-2 w-full border border-gray-300 rounded-md"
      placeholder="Enter workflow name" 
      required 
    />
  </div>
  <div class=" border rounded-lg">
    <div class="bg-gray-200  top-0 h-10">
      <i class="material-icons text-2xl text-green-500">flag</i> Start
      <i class="material-icons text-2xl text-green-500">south</i>
    </div>
  <div cdkDropList (cdkDropListDropped)="drop($event)">
    <div *ngFor="let step of steps; let i = index" cdkDrag class="p-4 border-b border-gray-200 ">
      <div class="flex items-center space-x-2">
          <div cdkDragHandle class="cursor-move text-gray-400 hover:text-gray-600">☰</div>
          <div class="w-16 text-sm text-gray-600 font-medium p-2 border rounded-lg border-gray-300 bg-gray-100"> # {{ i + 1 }} </div>
                   <i class="material-icons text-2xl text-green-500">south</i>

          <input type="text" [(ngModel)]="step.name" class="p-2 w-1/3 border border-gray-300 rounded-md h-10" placeholder="Step Name" required/>
          <select [(ngModel)]="step.user" class="p-2 border border-gray-300 rounded-md h-10" required>
              <option *ngFor="let user of users" [value]="user">{{ user }}</option>
          </select>
         
          <!-- Multi-select actions -->
          <div class="w-1/3">
            <!-- Input container with horizontal scrolling chips -->
              <div
                class="w-full border border-gray-300 rounded-md p-1 flex items-center gap-1 min-h-[42px] focus-within:ring-2 focus-within:ring-blue-500 overflow-x-auto whitespace-nowrap flex-nowrap scrollbar-thin scrollbar-thumb-gray-300 scrollbar-track-transparent"
              >
                <!-- Selected chips -->
                <span
                  *ngFor="let action of step.actions"
                  class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-1 rounded-full flex items-center shrink-0"
                >
                  {{ action }}
                  <button
                    type="button"
                    (click)="removeAction(step, action)"
                    class="ml-1 text-blue-500 hover:text-red-500 text-xs"
                    title="Remove"
                  >
                    ✕
                  </button>
                </span>

                <!-- Input field (grows if space available) -->
                <input
                  *ngIf="step.actions.length < 2"
                  type="text"
                  [(ngModel)]="step.actionInput"
                  (input)="updateFilteredActions(step)"
                  (keydown.enter)="addAction(step, step.filteredActions?.[0]); $event.preventDefault()"
                  placeholder="Add action..."
                  class="flex-grow min-w-[100px] border-none outline-none text-sm p-1 bg-transparent"
                />
              </div>

            <div *ngIf="step.filteredActions?.length" class="border border-gray-300 rounded-md mt-1 bg-white shadow z-10">
              <div *ngFor="let suggestion of step.filteredActions" class="px-3 py-1 cursor-pointer hover:bg-gray-100 text-sm" (click)="addAction(step, suggestion)">
                {{ suggestion }}
              </div>
            </div>
          </div>

          <button (click)="removeStep(i)" *ngIf="steps.length > 1" class="text-red-400 mt-2 text-xs"><i class="material-icons text-2xl">delete</i> </button>
      </div>
      <div *ngIf="userHasDuplicate(step.user, i)" class="text-red-500 text-sm mt-1 ml-16">
            This user is already assigned to another step.
          </div>
      <div *ngIf="step.action === 'sign & Approve'" class="mt-2 text-red-500 text-sm">
          <span>Signature is mandatory for this action</span>
      </div>
    </div>
  </div>
   <button (click)="addStep()" class="p-2 text-sm text-blue-600">
    Add New Step
  </button>
   <div class="bg-gray-200  bottom-0-0 h-10">
      <i class="material-icons text-2xl text-red-500">flag</i> Finish
    </div>
  </div>
 


  <!-- Save as Template Checkbox -->
<div class="mt-6 flex items-start space-x-4">
  <input
    type="checkbox"
    id="saveTemplate"
    [(ngModel)]="saveAsTemplate"
    class="mt-1"
  />
  <label for="saveTemplate" class="text-sm text-gray-700">Save this workflow as a template</label>
</div>

<!-- Template Name Input (only if checkbox is checked) -->
<div *ngIf="saveAsTemplate" class="mt-2">
  <label for="templateName" class="block text-sm text-gray-700">Template Name</label>
  <input
    type="text"
    id="templateName"
    [(ngModel)]="templateName"
    class="mt-1 p-2 w-full border border-gray-300 rounded-md"
    placeholder="Enter template name"
    required
  />
</div>

<div class="mt-4 flex items-start space-x-4">
  <input
    type="checkbox"
    id="publishCertificate"
    [(ngModel)]="publishCertificate"
    class="mt-1"
  />
  <label for="publishCertificate" class="text-sm text-gray-700">Final approval will publish\share the certificate</label>
</div>
<div class="mt-4">
   <button (click)="saveWorkflow()" class="bg-green-500 text-white px-4 py-2 rounded-md">
      Save Workflow
   </button>
 </div>
</div>
