<h2 class="text-lg font-bold mb-4">Configure Table</h2>
<div class="space-y-4">
  <div>
    <label class="block text-sm font-medium">Rows</label>
    <input type="number" [(ngModel)]="rows" min="1" class="form-input w-full" />
  </div>

  <div>
    <label class="block text-sm font-medium">Columns</label>
    <input type="number" [(ngModel)]="columns" min="1" class="form-input w-full" />
  </div>

  <div class="text-right mt-4">
    <button class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded mr-2" (click)="close()">Cancel</button>
    <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded" (click)="submit()">Insert</button>
  </div>
</div>
