  <div    
   [ngClass]="isDarkMode ? 'ag-theme-alpine-dark' : 'ag-theme-alpine'" class=" w-full h-[400px] dark:text-gray-300"
>
  <ag-grid-angular
    class=" w-full h-[400px] dark:text-gray-300"
    [sideBar]="sideBar"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [groupDisplayType]="'multipleColumns'"
    [animateRows]="true"
    [pagination]="true"
    [paginationPageSize]="10"
    [rowGroupPanelShow]="'always'"
    [enableRangeSelection]="true"
    [enableBrowserTooltips]="true"
    (gridReady)="onGridReady($event)"
  >
  </ag-grid-angular>
  </div>
