<div class="p-4">
  <div class="flex justify-end mb-2">
    <button (click)="openColumnConfigurator()" class="bg-blue-500 text-white p-2 rounded dark:bg-green-500 dark:hover:bg-green-700">
      Configure Columns
    </button>
  </div>
  <table class="table-auto w-full border dark:border-gray-700">
  <thead>
    <tr cdkDropList [cdkDropListData]="visibleColumns" (cdkDropListDropped)="dropColumn($event)"
      cdkDropListOrientation="horizontal">
        <th *ngFor="let column of visibleColumns; let i = index"
          cdkDrag
          [cdkDragData]="column"
          cdkDragLockAxis="x"
          [cdkDragDisabled]="column.isPinned"
          [style.width.px]="column.width"
          class="border px-2 py-1 relative dark:border-gray-700 dark:bg-gray-900 dark:text-gray-300"
          [ngClass]="{'bg-blue-100 ring-2 ring-blue-400': hoveredIndex === i}"
          (cdkDragEntered)="onDragEnter(i)"
          (cdkDragExited)="onDragLeave(i)">

          <div class="flex justify-between items-center">
            <span cdkDragHandle class="cursor-move">{{ column.name }}</span>
            <button class="ml-1 text-gray-500 hover:text-gray-700" (click)="toggleColumnMenu(i)">
              <i class="material-icons text-lg">more_vert</i> 
            </button>
            <div class="resizer w-2 cursor-col-resize absolute right-0 top-0 bottom-0" (mousedown)="startResize($event, column)"></div>
          </div>

          <ng-template cdkDragPreview>
            <div
              class="bg-white border px-2 py-1 shadow-lg text-sm"
              [style.width.px]="column.width"
            >
              {{ column.name }}
            </div>
          </ng-template>

          <ng-template cdkDragPlaceholder>
            <th [style.width.px]="column.width" class="invisible"></th>
          </ng-template>

          <div *ngIf="isMenuVisible" class="column-menu">
          <div *ngIf="activeMenuIndex === i" class="absolute text-sm top-full right-0 mt-1 w-48 bg-white border rounded shadow z-20 dark:bg-gray-900 dark:border-gray-700 dark:text-gray-300">
            <button (click)="toggleSort(column, 'asc')" class="block w-full px-3 py-2 text-left hover:bg-gray-100 dark:hover:bg-gray-700">
              A to Z
            </button>
             <button (click)="toggleSort(column, 'desc')" class="block w-full px-3 py-2 text-left hover:bg-gray-100 dark:hover:bg-gray-700 border-b dark:border-gray-700">
              Z to A
            </button>
            <button class="block w-full px-3 py-2 text-left hover:bg-gray-100 dark:hover:bg-gray-700" (click)="moveColumn(column,'left')">
              Move Left
            </button>
            <button class="block w-full px-3 py-2 text-left hover:bg-gray-100 dark:hover:bg-gray-700 border-b dark:border-gray-700" (click)="moveColumn(column,'right')">
              Move Right
            </button>    
            <button class="block w-full px-3 py-2 text-left hover:bg-gray-100 dark:hover:bg-gray-700" (click)="pinColumn(column)">
              {{ column.isPinned ? 'Unpin' : 'Pin' }} Column
            </button>
            <button class="block w-full px-3 py-2 text-left hover:bg-gray-100 dark:hover:bg-gray-700" (click)="hideColumn(column)">
              Hide Column
            </button>
            <button class="block w-full px-3 py-2 text-left hover:bg-gray-100 dark:hover:bg-gray-700 border-b dark:border-gray-700" (click)="renameColumn(column)">
              Rename Column
            </button>
            <button class="block w-full px-3 py-2 text-left hover:bg-gray-100 dark:hover:bg-gray-700" (click)="toggleFilterMenu(i)">
              Filter
            </button>
            <div *ngIf="activeFilterMenuIndex === i" class="p-3 border-t text-sm space-y-2 dark:border-gray-700">
            <div *ngIf="column.filter">
              <label class="block mb-1 font-medium">Operator</label>
              <select class="w-full border rounded px-2 py-1 dark:bg-gray-900 dark:border-gray-700" [(ngModel)]="column.filter!.operator">
                <option *ngFor="let op of getOperators(column)" [value]="op">
                  {{ op }}
                </option>
              </select>
            </div>

            <div>
              <label class="block mb-1 font-medium">Value</label>
              <input
                *ngIf="column.filter?.type === 'text' || column.filter?.type === 'number'"
                [(ngModel)]="column.filter!.value"
                class="w-full border rounded px-2 py-1 dark:bg-gray-900 dark:border-gray-700"
                [type]="column.filter?.type === 'number' ? 'number' : 'text'"
              />

              <div *ngIf="column.filter?.operator === 'between'" class="flex gap-2">
                <input
                  [(ngModel)]="column.filter!.value"
                  class="w-1/2 border rounded px-2 py-1 dark:bg-gray-900 dark:border-gray-700"
                  [type]="column.filter?.type === 'number' ? 'number' : 'text'"
                  placeholder="From"
                />
                <input
                  [(ngModel)]="column.filter!.valueTo"
                  class="w-1/2 border rounded px-2 py-1 dark:bg-gray-900 dark:border-gray-700"
                  [type]="column.filter?.type === 'number' ? 'number' : 'text'"
                  placeholder="To"
                />
              </div>
            </div>
          <button class="mt-2 w-full bg-blue-500 text-white px-3 py-1 rounded hover:bg-blue-600 dark:bg-green-500 dark:hover:bg-green-700" (click)="applyFilter(column)">
            Apply Filter
          </button>
        </div>
        </div>
          </div>
        </th>
     </tr>
  </thead>
  <tbody>
    <tr *ngFor="let row of filteredData">
      <td *ngFor="let column of visibleColumns; let i = index"
          [ngClass]="{'sticky bg-white dark:bg-gray-600': column.isPinned}"
          [style.left.px]="getPinnedOffset(i)"
          [style.width.px]="column.width"
          class="border px-2 py-1 dark:border-gray-700 dark:text-gray-300"
          [ngStyle]="getCellStyle(row[column.field], column).style">
            <span *ngIf="column.field === 'status'">
                {{ getStatusIcon(row[column.field]).icon }}
            </span>
            <span *ngIf="column.field !== 'status'">
              {{ row[column.field] }}
            </span>        
        </td>
    </tr>
    
  </tbody>

  
</table>
</div>


<!-- Configurator Modal -->
<div *ngIf="isConfigModalOpen" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 ">
  <div class="bg-white rounded-lg p-6 w-96 max-w-full shadow-lg dark:bg-gray-900 dark:text-gray-300">
    <h2 class="text-xl font-semibold mb-4">Column Configuration</h2>

    <div *ngFor="let column of columns" class="mb-4 border-b pb-2 dark:border-gray-700">
      <label class="block font-medium">{{ column.field }}</label>
      <input [(ngModel)]="column.name" placeholder="Display name" class="w-full border p-1 rounded mb-2 dark:bg-gray-800 dark:border-gray-700" />
      <div class="flex items-center space-x-2">
        <label><input type="checkbox" [(ngModel)]="column.isVisible" /> Visible</label>
        <label><input type="checkbox" [(ngModel)]="column.isPinned" /> Pinned</label>
      </div>
    </div>

    <div class="flex justify-end space-x-2 mt-4">
      <button (click)="closeColumnConfigurator()" class="bg-gray-300 hover:bg-gray-400 px-4 py-2 rounded dark:bg-gray-800 dark:hover:bg-gray-950">Cancel</button>
      <button (click)="saveLayout()" class="bg-blue-500 hover:bg-blue-700 text-white px-4 py-2 rounded dark:bg-green-500 dark:hover:bg-green-700">Save</button>
    </div>
  </div>
</div>
