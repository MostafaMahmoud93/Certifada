<!-- column-configurator.component.html -->
<div class="fixed inset-0 bg-gray-800 bg-opacity-50 flex justify-center items-center z-50">
  <div class="bg-white p-4 rounded-lg shadow-lg w-1/3">
    <h2 class="text-lg font-semibold mb-4">Column Configuration</h2>
    <div *ngFor="let column of columns">
      <div class="flex justify-between items-center mb-2">
        <div class="flex items-center space-x-2">
          <input type="checkbox" [(ngModel)]="column.isVisible" class="mr-2">
          <input type="text" [(ngModel)]="column.name" class="border p-1" placeholder="Rename column">
        </div>
        <div>
          <button (click)="togglePin(column)" class="bg-yellow-300 p-2 rounded">Pin</button>
        </div>
      </div>
    </div>
    <div class="mt-4">
      <button (click)="saveLayout()" class="bg-blue-500 text-white px-4 py-2 rounded">Save Layout</button>
    </div>
  </div>
</div>
