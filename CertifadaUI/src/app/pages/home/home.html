<section class="relative table w-full py-36 lg:py-64 overflow-hidden" id="home">
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute image-wrap -top-[350px] -bottom-[350px] -start-[100px] -end-[100px] min-w-full w-auto min-h-full h-auto overflow-hidden m-auto bg-[url('/assets/1.jpg')] bg-no-repeat bg-center bg-cover"></div>
    </div>
    <div class="absolute inset-0 bg-black/70"></div>

    <div class="container relative">
        <div class="grid grid-cols-1 text-center">
            <div class="text-center">
                <a [routerLink]="[]" (click)="openModal(modal)"class="lightbox size-20 rounded-full shadow-lg dark:shadow-gray-700 inline-flex items-center justify-center bg-white dark:bg-slate-900 text-violet-500 dark:text-white">
                    <i class="material-icons inline-flex items-center justify-center text-2xl">play_arrow</i>
                </a>
            </div>
            <app-modal #modal [active]="isActive">
                <iframe width="100%" height="100%"
                    src="https://www.youtube.com/embed/S_CGed6E610">
                    </iframe>
                <button (click)="closeModal(modal)" class="absolute top-[2%] right-[2%] bg-white text-gray-500 w-8 h-8 rounded-full">
                    <i class="material-icons text-lg">close</i>
                </button>
            </app-modal>

            <h4 class="text-white font-semibold lg:leading-normal leading-normal tracking-wide text-4xl lg:text-5xl my-5">We Collaboration Easy & Fast</h4>
        
            <p class="text-white/70 text-lg max-w-xl mx-auto">This is just a simple text made for this unique and awesome template, you can replace it with any text.</p>
        
            <div class="relative mt-8">
                <a [routerLink]="[]" class="h-10 px-6 tracking-wide inline-flex items-center justify-center font-medium rounded-md bg-violet-500 text-white">Get Started</a>
            </div>
        </div>
    </div>
</section>
<div class="relative">
    <div class="absolute block w-full h-auto bottom-[25px] z-1 start-0">
        <a href="home#about"><i class="material-icons absolute top-0 start-0 end-0 text-center inline-flex items-center justify-center rounded-full bg-white dark:bg-slate-900 h-12 w-12 mx-auto shadow-md dark:shadow-gray-800 text-lg text-violet-500 dark:text-slate-200">arrow_downward</i></a>
    </div>

    <div class="shape absolute sm:-bottom-px -bottom-[2px] start-0 end-0 overflow-hidden text-white dark:text-slate-900">
        <svg class="w-full h-auto scale-[2.0] origin-top" viewBox="0 0 2880 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 48H1437.5H2880V0H2160C1442.5 52 720 0 720 0H0V48Z" fill="currentColor"></path>
        </svg>
    </div>
</div>
