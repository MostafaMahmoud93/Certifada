<div
  *ngIf="isVisible"
  class="absolute bottom-4 transform  z-50 rounded-lg overflow-hidden shadow-lg dark:border dark:border-gray-800 "
  [ngClass]="{'left-2': currentDir === 'rtl','right-2': currentDir === 'ltr'}"
  [ngStyle]="{'max-width': parentWidth + 'px','width': '100%','aspect-ratio': '16 / 9','position': 'absolute'}">
  <ng-container *ngIf="isVideo; else imageTemplate">
    <video controls class="w-full h-full object-cover" [src]="mediaUrl" preload="metadata"></video>
  </ng-container>
  <ng-template #imageTemplate>
    <img [src]="mediaUrl" alt="Floating media" class="w-full h-full object-cover"/>
  </ng-template>
  <div class="absolute top-0 left-0 w-full h-full flex flex-col justify-between p-3 text-white bg-black/30">
    <div class="text-sm drop-shadow">
      {{ 'FLOAT.MESSAGE' | transloco }}
    </div>
    <button
        (click)="closeWidget()"
        class="absolute top-2 text-gray-500 hover:text-red-600"
        [ngClass]="{'left-2': currentDir === 'rtl','right-2': currentDir === 'ltr'}"
        aria-label="Close">
        <i class="material-icons text-2xl">close</i>
    </button>
  </div>
</div>
