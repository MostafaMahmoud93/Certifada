<div class="overflow-hidden inline-block">
  <div class="flex flex-col items-center w-full">
    <img [src]="data.image" class="w-full" alt="Canvas Preview">
    <button (click)="close()" class="absolute top-2 right-3 bg-black text-white rounded-full w-8 h-8 flex items-center justify-center">
      <i class="material-icons text-sm">close</i>
    </button>
    <div class="overflow-hidden block text-left w-full px-4">
        <div class="flex w-full p-1">
          <label class="font-semibold ">{{ data.label1 }}</label>
          <span class="px-2">{{ data.value1 }}</span>
        </div>
        <div class="flex w-full p-1">
          <label class="font-semibold">{{ data.label2 }}</label>
          <span class="px-2">{{ data.value2 }}</span>
        </div>
        <div class="flex w-full p-1">
          <label class="font-semibold">{{ data.label3 }}</label>
          <span class="px-2">{{ data.value3 }}</span>
        </div>
        <div class="flex w-full p-1">
          <label class="font-semibold">{{ data.label4 }}</label>
          <span class="px-2"><button class=" bg-blue-500 dark:bg-green-500 text-white px-4 rounded justify-center mb-2">{{ data.value4 }}</button></span>
       </div>
    </div>
  </div>
</div>
